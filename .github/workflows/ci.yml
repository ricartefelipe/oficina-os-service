name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build e testes
        run: ./mvnw -B -Pci clean verify

      - name: Upload cobertura JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Analise SonarCloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.projectKey=ricartefelipe_oficina-os-service \
            -Dsonar.organization=ricartefelipe \
            -Dsonar.host.url=https://sonarcloud.io

      - name: Build e push Docker
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t ghcr.io/ricartefelipe/oficina-os-service:latest \
                       -t ghcr.io/ricartefelipe/oficina-os-service:${{ github.sha }} .
          docker push ghcr.io/ricartefelipe/oficina-os-service:latest
          docker push ghcr.io/ricartefelipe/oficina-os-service:${{ github.sha }}
