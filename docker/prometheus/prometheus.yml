global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: oficina-os-service
    static_configs:
      - targets: ['host.docker.internal:8081']
    metrics_path: /api/actuator/prometheus

  - job_name: oficina-billing-service
    static_configs:
      - targets: ['host.docker.internal:8082']
    metrics_path: /api/actuator/prometheus

  - job_name: oficina-execution-service
    static_configs:
      - targets: ['host.docker.internal:8083']
    metrics_path: /api/actuator/prometheus

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: /metrics
