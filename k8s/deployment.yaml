apiVersion: apps/v1
kind: Deployment
metadata:
  name: oficina-os-service
  namespace: oficina
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oficina-os-service
  template:
    metadata:
      labels:
        app: oficina-os-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/actuator/prometheus
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: oficina-os-service
          image: ghcr.io/ricartefelipe/oficina-os-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: oficina-os-config
            - secretRef:
                name: oficina-os-secrets
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: oficina-os-service
  namespace: oficina
spec:
  selector:
    app: oficina-os-service
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: oficina-os-service-hpa
  namespace: oficina
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oficina-os-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
